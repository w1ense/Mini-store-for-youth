<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Главная страница мини магазина</title>
<style>
  :root {
    --bg-gradient: linear-gradient(135deg, #74ebd5, #ACB6E5);
    --text-color: #fff;
    --border-color: #fff;
    --button-bg: rgba(255, 255, 255, 0.2);
    --button-hover-bg: #fff;
    --button-hover-color: #333;
    --small-button-font-size: 0.9em; /* Размер маленькой кнопки */
  }
  
  /* Тёмная тема */
  body.dark {
    --bg-gradient: linear-gradient(135deg, #222, #555);
    --text-color: #eee;
    --border-color: #eee;
    --button-bg: rgba(255, 255, 255, 0.2);
    --button-hover-bg: #fff;
    --button-hover-color: #000;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: var(--bg-gradient);
    color: var(--text-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    transition: all 0.5s ease;
    position: relative;
  }

  /* Заголовок с эффектом появления */
  h1 {
    font-size: 3em;
    margin: 20px;
    opacity: 0;
    animation: fadeIn 2s forwards;
    animation-delay: 0.2s;
  }

  /* Кнопка "Перейти" */
  .btn {
    padding: 15px 30px;
    font-size: 1.2em;
    color: var(--text-color);
    background-color: var(--button-bg);
    border: 2px solid var(--border-color);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 30px;
    opacity: 0;
    animation: fadeIn 2s 1s forwards;
    text-decoration: none; /* Для ссылок */
    display: inline-block;
  }

  /* Эффект наведения */
  .btn:hover {
    background-color: var(--button-hover-bg);
    color: var(--button-hover-color);
    transform: scale(1.1);
  }

  /* Верхний левый блок с входом */
  .top-left-controls {
    position: fixed; /* фиксированный для постоянной позиции */
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }

  /* Верхний правый блок с переключением темы */
  .top-right-controls {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }

  /* Кнопка "Тёмная тема" или "Светлая тема" */
  .theme-toggle {
    padding: 8px 12px; /* чуть меньше по размеру */
    font-size: var(--small-button-font-size);
    background: transparent;
    border: 2px solid var(--border-color);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.3s ease;
    color: var(--text-color);
  }

  /* Анимация исчезновения/появления */
  @keyframes fadeIn {
    to {
      opacity: 1;
    }
  }

  /* Движущийся фон */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle, #ffffff33 2%, transparent 20%);
    background-repeat: repeat;
    animation: moveBackground 60s linear infinite;
    z-index: -1;
  }

  @keyframes moveBackground {
    from {
      background-position: 0 0;
    }
    to {
      background-position: 1000px 1000px;
    }
  }
</style>
</head>
<body>

<!-- Верхний левый блок с кнопкой входа -->
<div class="top-left-controls">
  <a href="vhod.html" class="btn">Войти</a>
</div>

<!-- Верхний правый блок с переключением темы -->
<div class="top-right-controls">
  <button class="theme-toggle" id="themeBtn">Тёмная тема</button>
</div>

<h1>Добро пожаловать в магазин молодежи!</h1>
<!-- Кнопка перехода -->
<a href="catalog.html" class="btn">Перейти на главную страницу</a>

<script>
  const themeBtn = document.getElementById('themeBtn');
  const body = document.body;

  // Переключатель темы
  themeBtn.onclick = () => {
    body.classList.toggle('dark');
    if (body.classList.contains('dark')) {
      themeBtn.textContent = 'Светлая тема';
    } else {
      themeBtn.textContent = 'Тёмная тема';
    }
  };
</script>

</body>
</html>
